<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1><b></b>Calculadora de desempenho (LOXEN)</h1><br>
<h3>Digite a quantidade de vendas feitas por mês</h3> <input type="text" id="inputVendas">
<h3>Digite o ticket médio em Reais (R$) </h3> <input type="text" id="inputTicket"><br><br><br>
<button onclick="verificar()"><b>Verficar meu desempenho</b></button><br><br>
<div id="div_mensagem"><b></b></div>

</body>
</html>
<script>
function verificar(){
let vendas = Number(inputVendas.value);
let ticket = Number(inputTicket.value);
let valorBruto = vendas * ticket;

if (valorBruto>0){
div_mensagem.innerHTML = `Parabéns pelo excelente desempenho de <b>R$${valorBruto.toFixed(2)}</b> de faturamento,<br> 
 Nós enxergamos um grande potencial de Alavancar esses números! <br><br> <button onclick= "descobrir()"><b>DESCUBRA AQUI</b>`
 }else{
    alert('Você Inseriu um valor Invalido \n Tente Novamente')

 }
}
function descobrir(){
let vendas = Number(inputVendas.value);
let ticket = Number(inputTicket.value);
let valorBruto = vendas * ticket;
let aumento = valorBruto * 1.30;

div_mensagem.innerHTML += `<br><br><b>Com os sensores Loxen, a realidade do seu comercio será transformada, 
tomando decisões estratégicas baseadas em dados armazenados em tempo real, o seu faturamento pode passar de R$${valorBruto.toFixed(2)} e chegar até R$${aumento.toFixed(2)}
 o que representa um aumento de 30%.</b><br><br> <button onclick = "contato()">Fale Conosco`
}
function contato(){
    alert("Obrigado por fazer a nossa simulação entre em contato através de nossos canais de comunicação\n Telefone: 55+ (11)12345-6789\n Email: teste@loxen.br")

}
</script>
