<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title> Simulador Financeiro - Loxen</title>
</head>

<body>
    <div id="navbar">
        <img src="./assets/logo.png" alt="Logo-Loxen">
    </div>
    <div id="conteudo">
        <div id="div-simulacao">
            <p>Simule seus lucros com o Sistema Loxen:</p>
            <div id="simule-lucro">
                <div id="div_inputs">
                    <div class="div_labelInput">
                        <label for="ipt_lucroMensal">Lucro Mensal atual (R$):</label>
                        <input type="number" id="ipt_lucroMensal" placeholder="Ex: 150.000">
                    </div>
                    <div class="div_labelInput">
                        <label for="ipt_qtdProdutosVendidosMes">Quantidade de produtos vendidos por mês:</label>
                        <input type="number" id="ipt_qtdProdutosVendidosMes" placeholder="Ex: 100">
                    </div>
                </div>
                <button onclick="calcular()">Simular Agora</button>
            </div>
        </div>
        <div id="resultado" style="display: none;">
            <div id="resposta">
                <div class="separacao-canvas">
                    <p>Lucro Final Previsto</p>
                    <canvas id="canvas_lucroTotal"></canvas>
                </div>
                <div class="separacao-canvas">
                    <p>Vendas Previstas</p>
                    <canvas id="canvas_qtdVendas"></canvas>
                </div>
                <div id="resumo"></div>
            </div>
        </div>

    </div>
</body>
<script>
    let lucroAtualMes = 0;
    let qtdProdutosVendidosMes = 0;
    let lucroLoxen = 0;
    let aumentoVendas = 0

    function calcular() {
        lucroAtualMes = Number(ipt_lucroMensal.value);
        qtdProdutosVendidosMes = Number(ipt_qtdProdutosVendidosMes.value);
        lucroLoxen = lucroAtualMes * 1.30;
        aumentoVendas = qtdProdutosVendidosMes * 1.20;


        if (lucroAtualMes == "" || qtdProdutosVendidosMes == "") {
            alert('Por favor, preencha todos os campos para continuar.')
        } else {
            document.getElementById("div-simulacao").style.display = "none";
            document.getElementById("resultado").style.display = "block";
            gerarGraficos();
        }
    }

    function gerarGraficos() {
        const canvaLucro = document.getElementById('canvas_lucroTotal');
        const canvaVenda = document.getElementById('canvas_qtdVendas');

        new Chart(canvaLucro, {
            type: 'bar',
            data: {
                labels: ['Lucro Atual', 'Lucro com Loxen'],
                datasets: [{
                    label: 'Comparação Lucro Mensal (R$)',
                    data: [lucroAtualMes, lucroLoxen],
                    borderWidth: 1,
                    backgroundColor: [
                        'rgba(249, 92, 92, 0.593)',
                        'rgba(137, 248, 77, 0.593)'
                    ]
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        new Chart(canvaVenda, {
            type: 'bar',
            data: {
                labels: ['Quantidade Atual', 'Quantidade com Loxen'],
                datasets: [{
                    label: 'Quantidade de Produtos Vendidos Mensalmente',
                    data: [qtdProdutosVendidosMes, aumentoVendas],
                    borderWidth: 1,
                    backgroundColor: [
                        'rgba(249, 92, 92, 0.593)',
                        'rgba(137, 248, 77, 0.593)'
                    ]
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        resumo.innerHTML = `<b>Resumo:</b> <br>
        Sua empresa vende atualmente <b>${qtdProdutosVendidosMes}</b> produtos por mês. <br> 
        Com a Loxen, a estimativa é de <b style="color: green;"> ${(aumentoVendas).toFixed()}</b> vendas mensais. <br><br>
        Seu lucro atual é de <b>R$${(lucroAtualMes).toFixed(2)}</b> por mês. <br> 
        Com a Loxen, a projeção de lucro será de até <b style="color: green;"> R$${(lucroLoxen).toFixed(2)} </b> mensais. <br>
         `
    }
</script>

</html>
