<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOXEN | Dashboard Geral</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/dash_geral.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/heatmap.js"></script>

</head>

<body>
    <div class="sidebar">
        <img class="logo" src="assets/icon/logo.png" alt="Logo">
        <ul class="menu">
            <li class="agora">Dashboard</li>
            <li><a href="Dashboard.html">Dashboard Filial</a></li>
        </ul>
        <div class="user">
            <img class="userIcon" src="assets/img/userIcon.png">
            <b>Luis Henrique</b>
        </div>
        <button onclick="logout()" class="btn-sair">Sair</button>
    </div>
    <div class="conteudo">
        <h2>Filial - SPTech<img class="seta" src="assets/img/setaDash.png" alt=""></h2>
        <div class="kpis">
            <div class="card">
                <p>Comparação de Fluxo (Abril X Março)</p>
                <div class="conteudoKpi">
                    <img class="kpiImg" src="assets/img/kpi1.png">
                    <h3><span style="color: red;">-12%</span> (495 Acessos)</h3>
                </div>
            </div>
            <div class="card">

                <p>Setor Mais Visitado - Mês de Abril</p>
                <div class="conteudoKpi">
                    <img class="kpiImg" src="assets/img/kpi2.png">
                    <h3>Lacticínios - <span style="color: green;">486 Acessos</span></h3>
                </div>
            </div>

        </div>
        <div class="graficos">
            <div class="grafico">
                <h3>Fluxo Médio Mensal | Março</h3>
                <canvas class="canva1" id="myChart"></canvas>
            </div>
            <div class="grafico">
                <h3>Fluxo Médio Semanal por Setor | 20/04 - 26/04</h3>
                <canvas class="canva2" id="myChart2"></canvas>
            </div>

            <div class="grafico_total">
                <div class="texto">
                    <h3>Fluxo Acumulado por Hora | Ontem</h3>
                    <div class="meta">
                        <input type="text" id="inp_meta" placeholder="Insira a meta">
                        <button onclick="inserirMeta()">Ver no gráfico</button>
                    </div>
                </div>
                <canvas class="canva3" id="myChart3"></canvas>
            </div>

        </div>
    </div>
</body>

</html>

<script>

    function logout() {
        window.location.href = `index.html`;
    };

    const labels = [ // Gráfico de barra - média fluxo do mercado inteiro por mês

    {

    {

    function inserirMeta() {
        
        data3.datasets[0].data = [];
        valorMeta = inp_meta.value;

        for (i = 0; i < filial.length; i++) {
            data3.datasets[0].data.push(valorMeta);
        }
        myChart3.update();
    }


    for (i = 0; i < filial.length; i++) {
        total.push(filial[i].total);
        nome.push(filial[i].nome);
    }


    const labels3 = nome;
    const data3 = {
        labels: labels3,
        datasets: [{
            label: 'Meta',
            data: [],

            type: 'line',

        {
            label: `Total de acessos por mês`,
            borderColor: 'rgb(94, 25, 255)',
            backgroundColor: 'rgb(94, 25, 255)',
            borderRadius: 7,
            data: total
        }
        ]
    };


    const config3 = {
        type: 'bar',
        data: data3,
        options: {}
    };



    const myChart = new Chart(
        document.getElementById('myChart'),
        config
    );

    const myChart2 = new Chart(
        document.getElementById('myChart2'),
        config2

    const myChart3 = new Chart(
        document.getElementById('myChart3'),
        config3
    );

</script>
