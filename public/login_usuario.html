<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Loxen - Login</title>
</head>

<body>

    <div class="login_usuario">
        <a href="index.html" class="voltar">
            <img src="assets/img/arrow-left.png">
        </a>
        <div class="info">
            <div class="formulario">
                <img src="assets/icon/logo.png" alt="Logo">
                <h3>Entre</h3>
                <input type="text" id="ipt_email" placeholder="Entre com seu email">

                <div class="validacao-campo">
                    <input type="password" id="ipt_senha" placeholder="Insira a sua senha">
                    <i class="fa-solid fa-eye olho" onclick="mostrar()"></i>
                </div>

                <button onclick="entrar()">Entrar</button>
            </div>
        </div>

        <div class="painel">
            <h1>Bem-Vindo de <br> Volta!</h1>
        </div>
    </div>

</body>

</html>
<script>

    function entrar() {
        let emailVar = ipt_email.value
        let senhaVar = ipt_senha.value

        if (emailVar == "" || senhaVar == "") {
            div_msg.innerHTML = "Preencha todos os campos";
            return false;
        }
        else {
            setInterval(2000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.ID_USUARIO = json.idUser;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.CARGO_USUARIO = json.cargo;
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.FKFILIAL_USUARIO = json.fkFilial;
                    sessionStorage.FKEMPRESA_USUARIO = json.fkEmpresa;

                    
                    console.log('vou redirecionar')
                    window.location = "./Dashboard.html";
                     
                });

            } else {
                console.log("Houve um erro ao tentar realizar o login!");
                div_msg.innerHTML = "Email e/ou senha inválidos"
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function mostrar() {
        if (ipt_senha.type === "password") {
            ipt_senha.type = "text";
        } else {
            ipt_senha.type = "password";
        }
    }
</script>
