<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Loxen - Cadastro Usuário</title>
</head>

<body>

    <div class="cadastro">
        <div class="info">
            <div class="formulario">
                <img src="assets/icon/logo.png" alt="Logo">
                <h3>Cadastro Usuário</h3>
                <p>Email</p><input type="text" id="ipt_email" placeholder="Insira o seu email"><br>
                <p>Nome</p><input type="text" id="ipt_nome_usuario" placeholder="Insira o seu nome"><br>
                <p>Senha</p><input type="text" id="ipt_senha" placeholder="Insira sua Senha"><br>
                <p>Confirme sua Senha</p><input type="text" id="ipt_senha_confirmar" placeholder="Insira novamente sua Senha"><br>
                <p>Cargo</p><select id="slt_cargo">
                    <option disabled selected>Selecione o Cargo</option>
                    <option value="1">Funcionário</option>
                    <option value="2">Gerente</option>
                    <option value="3">Administrador</option>
                </select><br>
                <button onclick="registrar()">Registre</button>
            </div>
        </div>

        <div class="painel">
            <h1>Venha começar  sua <br> jornada  conosco</h1>
        </div>
    </div>

</body>

</html>
</body>
</html>
