<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Loxen - Cadastro</title>
</head>

<body>

    <div class="cadastro">
        <a href="Dashboard.html" class="voltar">
            <img src="../site/assets/img/arrow-left.png">
        </a>
        <div class="info">
            <div class="formulario">
                <img src="assets/icon/logo.png" alt="Logo">
                <h3>Cadastro Filial</h3>
                <input type="text" id="ipt_nome" placeholder="Nome da Filial">
                <div oninput="cnpj()" class="validacao-campo">
                    <input type="text" id="ipt_cnpj" oninput="cnpj()" placeholder="CNPJ" maxlength="18">
                    <div id="validacao" class="validacao"></div>
                </div>
                <input type="text" id="ipt_rua" placeholder="Rua da filial">
                <input type="text" id="ipt_cidade" placeholder="Cidade da filial">

                <select id="slt_uf">
                    <option value="vazio" disabled selected>Selecione o Estado</option>
                    <option value="Acre">AC</option>
                    <option value="Alagoas">AL</option>
                    <option value="Amapá">AP</option>
                    <option value="Amazonas">AM</option>
                    <option value="Bahia">BA</option>
                    <option value="Ceará">CE</option>
                    <option value="Distrito Federal">DF</option>
                    <option value="Espírito Santo">ES</option>
                    <option value="Goiás">GO</option>
                    <option value="Maranhão">MA</option>
                    <option value="Mato Grosso">MT</option>
                    <option value="Mato Grosso do Sul">MS</option>
                    <option value="Minas Gerais">MG</option>
                    <option value="Pará">PA</option>
                    <option value="Paraíba">PB</option>
                    <option value="Paraná">PR</option>
                    <option value="Pernambuco">PE</option>
                    <option value="Piauí">PI</option>
                    <option value="Rio de Janeiro">RJ</option>
                    <option value="Rio Grande do Norte">RN</option>
                    <option value="Rio Grande do Sul">RS</option>
                    <option value="Rondônia">RO</option>
                    <option value="Roraima">RR</option>
                    <option value="Santa Catarina">SC</option>
                    <option value="São Paulo">SP</option>
                    <option value="Sergipe">SE</option>
                    <option value="Tocantins">TO</option>
                </select>
                <div oninput="cnpj()" class="validacao-campo">
                <input type="text" id="ipt_cep" oninput="cep()" placeholder="CEP" maxlength="9">
                <div id="validacao2" class="validacao"></div>
                </div>
                <button onclick="registrar()">Registrar</button>
            </div>
        </div>

        <div class="painel">
            <h1>Venha começar <br> sua jornada <br> conosco</h1>
        </div>
    </div>

</body>

</html>

<script>

    function cnpj() {
        let cnpj = ipt_cnpj.value.replace(/\D/g, ``);
        let tamanhoCnpj = cnpj.length;
        let formatado = ``;

        if (tamanhoCnpj !== 18) {
            validacao.innerHTML = `O CNPJ precisa ter 14 números.`;
        }

        if (tamanhoCnpj > 0) {
            formatado = cnpj.slice(0, 2);

            if (tamanhoCnpj > 2) {
                formatado += `.` + cnpj.slice(2, 5);
            }

            if (tamanhoCnpj > 5) {
                formatado += `.` + cnpj.slice(5, 8);
            }

            if (tamanhoCnpj > 8) {
                formatado += `/` + cnpj.slice(8, 12);
            }

            if (tamanhoCnpj > 12) {
                formatado += `-` + cnpj.slice(12, 14);
            }
        }

        ipt_cnpj.value = formatado;

    }

    function cep() {
        let cep = ipt_cep.value.replace(/\D/g, ``);
        let tamanhoCep = cep.length;
        let formatado = ``;

        if (tamanhoCep !== 8) {
            validacao2.innerHTML = `O CEP precisa ter 8 números.`;
        }

        if (tamanhoCep > 0) {
            formatado = cep.slice(0, 5);

            if (tamanhoCep > 5) {
                formatado += `-` + cep.slice(5, 8);
            }

        }

        ipt_cep.value = formatado;

    }

    function registrar() {
        // variáveis dos inputs
        let nome = ipt_nome.value;
        let cep = ipt_cep.value;
        let cnpj = ipt_cnpj.value;
        let rua = ipt_rua.value;
        let uf = slt_uf.value;

        // variáveis para a lógica

        let tamanhoCnpj = cnpj.length;
        let tamanhoCep = cep.length;

        if (nome == `` || cep == `` || cnpj == `` || rua == `` || uf == `vazio`) {
            alert(`Preencha todos os campos!`);
        } else if (tamanhoCnpj !== 18) {
            alert(`Insira um CNPJ válido!`);
        } else if (tamanhoCep !== 9) {
            alert(`Insira um CEP válido!`);
        } else {
            alert(`Cadastro realizado com sucesso!`);
            window.location.href = `home.html`;
        }
    }

</script>
